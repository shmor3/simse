name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, staging, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: moon run :setup

      - name: Run checks
        run: moon ci :lint :format-check :test

  promote:
    name: Promote
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Promote main -> staging
        if: github.ref == 'refs/heads/main'
        run: git push origin HEAD:staging

      - name: Promote staging -> production
        if: github.ref == 'refs/heads/staging'
        run: git push origin HEAD:production

  deploy:
    name: Deploy
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/production')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v6

      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: moon run :setup

      - name: Set deploy environment
        id: env
        run: echo "name=${{ github.ref == 'refs/heads/production' && 'production' || 'staging' }}" >> "$GITHUB_OUTPUT"

      # Only simse-landing and simse-mailer are deployed to production.
      # Uncomment other services when they are ready for deployment.

      # Workers
      - name: Deploy simse-mailer
        working-directory: simse-mailer
        run: bunx wrangler deploy --env ${{ steps.env.outputs.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Pages
      - name: Build simse-landing
        working-directory: simse-landing
        run: bun run build

      - name: Deploy simse-landing
        working-directory: simse-landing
        run: bunx wrangler pages deploy ./build/client --project-name simse-landing --branch ${{ steps.env.outputs.name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
