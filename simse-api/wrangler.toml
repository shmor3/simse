name = "simse-api"
compatibility_date = "2025-04-01"
main = "src/index.ts"

workers_dev = true

routes = [
  { pattern = "api.simse.dev", custom_domain = true }
]

# No database — pure gateway

[[queues.producers]]
queue = "simse-api-comms"
binding = "COMMS_QUEUE"

# Secrets (set via `wrangler secret put`):
# AUTH_API_URL
# AUTH_API_SECRET
# PAYMENTS_API_URL
# PAYMENTS_API_SECRET
# MAILER_API_URL (for reading notifications)
