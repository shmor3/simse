name = "simse-api"
compatibility_date = "2025-04-01"
main = "src/index.ts"

workers_dev = true

routes = [
  { pattern = "api.simse.dev", custom_domain = true }
]

# No database — pure gateway

[[queues.producers]]
queue = "simse-api-comms"
binding = "COMMS_QUEUE"

[[secrets_store.bindings]]
binding = "SECRETS"
store_id = "dbcc2c7d2faa4f9a829692ae71f58d88"

[[queues.producers]]
queue = "simse-api-analytics"
binding = "ANALYTICS_QUEUE"

# --- Environments ---

[env.staging]
name = "simse-api-staging"
workers_dev = true
routes = []

[[env.staging.queues.producers]]
queue = "simse-api-comms-staging"
binding = "COMMS_QUEUE"

[[env.staging.queues.producers]]
queue = "simse-api-analytics-staging"
binding = "ANALYTICS_QUEUE"

[[env.staging.secrets_store.bindings]]
binding = "SECRETS"
store_id = "dbcc2c7d2faa4f9a829692ae71f58d88"

[env.production]
name = "simse-api"
routes = [{ pattern = "api.simse.dev", custom_domain = true }]

[[env.production.queues.producers]]
queue = "simse-api-comms"
binding = "COMMS_QUEUE"

[[env.production.queues.producers]]
queue = "simse-api-analytics"
binding = "ANALYTICS_QUEUE"

[[env.production.secrets_store.bindings]]
binding = "SECRETS"
store_id = "dbcc2c7d2faa4f9a829692ae71f58d88"
