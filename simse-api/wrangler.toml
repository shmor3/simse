name = "simse-api"
compatibility_date = "2025-04-01"
main = "src/index.ts"

workers_dev = true

routes = [
  { pattern = "api.simse.dev", custom_domain = true }
]

# No database — pure gateway

[[services]]
binding = "CLOUD_SERVICE"
service = "simse-cloud"

[[queues.producers]]
queue = "simse-api-comms"
binding = "COMMS_QUEUE"

[[secrets_store.bindings]]
binding = "SECRETS"
store_id = "PLACEHOLDER_REPLACE_WITH_STORE_ID"

[analytics_engine]
dataset = "simse-analytics"
binding = "ANALYTICS"

# --- Environments ---

[env.staging]
name = "simse-api-staging"
workers_dev = true
routes = []

[[env.staging.services]]
binding = "CLOUD_SERVICE"
service = "simse-cloud-staging"

[[env.staging.queues.producers]]
queue = "simse-api-comms-staging"
binding = "COMMS_QUEUE"

[[env.staging.secrets_store.bindings]]
binding = "SECRETS"
store_id = "PLACEHOLDER_STAGING_STORE_ID"

[env.production]
name = "simse-api"
routes = [{ pattern = "api.simse.dev", custom_domain = true }]

[[env.production.services]]
binding = "CLOUD_SERVICE"
service = "simse-cloud"

[[env.production.queues.producers]]
queue = "simse-api-comms"
binding = "COMMS_QUEUE"

[[env.production.secrets_store.bindings]]
binding = "SECRETS"
store_id = "PLACEHOLDER_REPLACE_WITH_STORE_ID"
