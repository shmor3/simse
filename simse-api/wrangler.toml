name = "simse-api"
compatibility_date = "2025-04-01"
main = "src/index.ts"

workers_dev = true

routes = [
  { pattern = "api.simse.dev", custom_domain = true }
]

# No database — pure gateway

[[queues.producers]]
queue = "simse-api-comms"
binding = "COMMS_QUEUE"

[[secrets_store.bindings]]
binding = "SECRETS"
store_id = "PLACEHOLDER_REPLACE_WITH_STORE_ID"
