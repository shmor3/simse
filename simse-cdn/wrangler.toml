name = "simse-cdn"
compatibility_date = "2025-04-01"
main = "src/index.ts"

workers_dev = true

routes = [{ pattern = "cdn.simse.dev", custom_domain = true }]

[[r2_buckets]]
binding = "CDN_BUCKET"
bucket_name = "simse-cdn"

[[kv_namespaces]]
binding = "VERSION_STORE"
id = "PLACEHOLDER_REPLACE_WITH_KV_ID"

[[queues.producers]]
queue = "simse-cdn-analytics"
binding = "ANALYTICS_QUEUE"

# --- Environments ---

[env.staging]
name = "simse-cdn-staging"
workers_dev = true
routes = []

[[env.staging.r2_buckets]]
binding = "CDN_BUCKET"
bucket_name = "simse-cdn-staging"

[[env.staging.kv_namespaces]]
binding = "VERSION_STORE"
id = "PLACEHOLDER_STAGING_KV_ID"

[[env.staging.queues.producers]]
queue = "simse-cdn-analytics-staging"
binding = "ANALYTICS_QUEUE"

[env.production]
name = "simse-cdn"
routes = [{ pattern = "cdn.simse.dev", custom_domain = true }]

[[env.production.r2_buckets]]
binding = "CDN_BUCKET"
bucket_name = "simse-cdn"

[[env.production.kv_namespaces]]
binding = "VERSION_STORE"
id = "PLACEHOLDER_REPLACE_WITH_KV_ID"

[[env.production.queues.producers]]
queue = "simse-cdn-analytics"
binding = "ANALYTICS_QUEUE"
