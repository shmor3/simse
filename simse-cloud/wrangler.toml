name = "simse-cloud"
compatibility_date = "2025-04-01"
main = "./worker.ts"

[vars]
APP_URL = "https://app.simse.dev"

[[d1_databases]]
binding = "DB"
database_name = "simse-db"
database_id = "placeholder-update-after-create"

[[kv_namespaces]]
binding = "SESSIONS"
id = "placeholder-update-after-create"

# Secrets (set via `wrangler secret put`):
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# EMAIL_API_URL
# EMAIL_API_SECRET
# SESSION_SECRET
