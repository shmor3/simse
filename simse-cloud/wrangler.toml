name = "simse-cloud"
compatibility_date = "2025-04-01"
pages_build_output_dir = "./build/client"

[vars]
APP_URL = "https://app.simse.dev"

routes = [{ pattern = "app.simse.dev", custom_domain = true }]

# No database — calls simse-api
# No secrets — simse-api handles service auth

[analytics_engine]
dataset = "simse-analytics"
binding = "ANALYTICS"

# --- Environments ---

[env.staging]
name = "simse-cloud-staging"

[env.staging.vars]
APP_URL = "https://simse-cloud-staging.pages.dev"

[env.production]
name = "simse-cloud"
routes = [{ pattern = "app.simse.dev", custom_domain = true }]

[env.production.vars]
APP_URL = "https://app.simse.dev"
