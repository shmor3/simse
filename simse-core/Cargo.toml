[package]
name = "simse-core"
version = "0.1.0"
edition = "2021"

[lib]
name = "simse_core"
path = "src/lib.rs"

[[bin]]
name = "simse-core-engine"
path = "src/main.rs"

[dependencies]
simse-acp-engine = { path = "../simse-acp" }
simse-mcp-engine = { path = "../simse-mcp" }
simse-adaptive-engine = { path = "../simse-adaptive" }
simse-vfs-engine = { path = "../simse-vfs" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
uuid = { version = "1", features = ["v4"] }
futures = "0.3"
async-trait = "0.1"
tokio-util = "0.7"
regex = "1"
chrono = "0.4"
rand = "0.8"
glob = "0.3"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
