name = "simse-mailer"
compatibility_date = "2025-04-01"
main = "src/index.ts"

[[d1_databases]]
binding = "DB"
database_name = "simse-mailer-db"
database_id = "841b91a0-7e61-44d9-af16-4e64000c11c7"

[[secrets_store.bindings]]
binding = "SECRETS"
store_id = "dbcc2c7d2faa4f9a829692ae71f58d88"

[[queues.consumers]]
queue = "simse-auth-comms"

[[queues.consumers]]
queue = "simse-api-comms"

[[queues.consumers]]
queue = "simse-landing-comms"

[[queues.producers]]
queue = "simse-mailer-analytics"
binding = "ANALYTICS_QUEUE"

# --- Environments ---

[env.staging]
name = "simse-mailer-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "simse-mailer-db-staging"
database_id = "PLACEHOLDER_STAGING_MAILER_DB_ID"

[[env.staging.secrets_store.bindings]]
binding = "SECRETS"
store_id = "dbcc2c7d2faa4f9a829692ae71f58d88"

[[env.staging.queues.consumers]]
queue = "simse-auth-comms-staging"

[[env.staging.queues.consumers]]
queue = "simse-api-comms-staging"

[[env.staging.queues.consumers]]
queue = "simse-landing-comms-staging"

[[env.staging.queues.producers]]
queue = "simse-mailer-analytics-staging"
binding = "ANALYTICS_QUEUE"

[env.production]
name = "simse-mailer"

[[env.production.d1_databases]]
binding = "DB"
database_name = "simse-mailer-db"
database_id = "841b91a0-7e61-44d9-af16-4e64000c11c7"

[[env.production.secrets_store.bindings]]
binding = "SECRETS"
store_id = "dbcc2c7d2faa4f9a829692ae71f58d88"

[[env.production.queues.consumers]]
queue = "simse-auth-comms"

[[env.production.queues.consumers]]
queue = "simse-api-comms"

[[env.production.queues.consumers]]
queue = "simse-landing-comms"

[[env.production.queues.producers]]
queue = "simse-mailer-analytics"
binding = "ANALYTICS_QUEUE"
